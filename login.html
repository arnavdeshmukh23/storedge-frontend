<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — Storedge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --sky:#00AEEF; --sky-glow:rgba(0,174,239,0.4); --green:#00e5a0;
      --bg:#06090f; --surface:#0c1219; --border:rgba(255,255,255,0.08);
      --text:#dde6f0; --muted:rgba(221,230,240,0.42);
      --font-display:'Clash Display','Syne',sans-serif;
      --font-body:'Plus Jakarta Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 0%,rgba(0,174,239,0.1) 0%,transparent 70%);pointer-events:none;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 80%);pointer-events:none;}

    .card{
      background:var(--surface);border:1px solid var(--border);border-radius:28px;
      padding:44px 42px;width:100%;max-width:420px;position:relative;
      animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--sky),transparent);}

    .logo{font-family:var(--font-display);font-weight:700;font-size:21px;background:linear-gradient(135deg,#fff,var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:28px;display:block;text-decoration:none;}
    h1{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:-0.4px;margin-bottom:5px;}
    .sub{font-size:14px;color:var(--muted);margin-bottom:28px;}
    .sub a{color:var(--sky);text-decoration:none;font-weight:500;}

    .field{margin-top:16px;}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;}
    input{
      width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
      border-radius:12px;padding:12px 15px;font-family:var(--font-body);font-size:14px;
      color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;
    }
    input::placeholder{color:rgba(255,255,255,0.18);}
    input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(0,174,239,0.1);}

    .forgot{display:block;text-align:right;font-size:12px;font-weight:500;color:var(--sky);text-decoration:none;margin-top:8px;}

    .btn-submit{
      width:100%;margin-top:24px;padding:14px;
      background:var(--sky);border:none;border-radius:14px;
      font-family:var(--font-body);font-size:15px;font-weight:600;color:#06090f;
      cursor:pointer;transition:all 0.25s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-submit:hover:not(:disabled){background:#22c5ff;box-shadow:0 0 24px var(--sky-glow);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}

    .spinner{width:18px;height:18px;border:2px solid rgba(6,9,15,0.3);border-top-color:#06090f;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-submit.loading .btn-text{display:none;}
    .btn-submit.loading .spinner{display:block;}

    .toast{display:none;margin-top:14px;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;text-align:center;}
    .toast.err{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.25);color:#ff8080;}
    .toast.ok{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:var(--green);}
    .toast.show{display:block;}

    .divider{display:flex;align-items:center;gap:14px;margin:20px 0;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .btn-google{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:14px;font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;}
    .btn-google:hover{border-color:rgba(255,255,255,0.18);color:var(--text);}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <a href="index.html" class="logo">Storedge</a>
  <h1>Welcome back 👋</h1>
  <p class="sub">Don't have an account? <a href="signup.html">Sign up free →</a></p>

  <div class="field"><label>Email address</label><input id="email" type="email" placeholder="you@gmail.com" autocomplete="email"/></div>
  <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
  <a href="#" class="forgot">Forgot password?</a>

  <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
    <span class="btn-text">Log in →</span>
    <div class="spinner"></div>
  </button>

  <div class="toast" id="toast"></div>

  <div class="divider">or</div>
  <button class="btn-google" onclick="showToast('Google sign-in coming soon!','err')">
    <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.7 29.2 37 24 37a13 13 0 0 1 0-26c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7A21 21 0 1 0 45 24c0-1.4-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8A13 13 0 0 1 24 11c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7A21 21 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 45a21 21 0 0 0 14.6-5.9l-6.7-5.5A13 13 0 0 1 24 37a13 13 0 0 1-12.4-9.1l-6.6 5.1A21 21 0 0 0 24 45z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.4-2.5 4.4-4.7 5.6l6.7 5.5C41.7 35.4 45 30.1 45 24c0-1.4-.1-2.7-.4-4z"/></svg>
    Continue with Google
  </button>
</div>

<script>
  const API_URL = 'https://storedge-backend.onrender.com';

  function showToast(msg, type='err') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.classList.remove('show'); }, 4000);
  }

  function setLoading(on) {
    const btn = document.getElementById('loginBtn');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    if (!email)    return showToast('Please enter your email address.');
    if (!password) return showToast('Please enter your password.');

    setLoading(true);

    try {
      const res = await fetch(`${API_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        // Generic message — don't reveal whether email or password is wrong
        showToast('Invalid email or password. Please try again.');
        return;
      }

      // Store token + basic user info
      localStorage.setItem('storedge_token', data.token);
      if (data.user) {
        localStorage.setItem('storedge_user', JSON.stringify(data.user));
      }

      showToast('Logged in! Taking you to your dashboard…', 'ok');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);

    } catch (err) {
      showToast('Cannot reach server. Check your connection and try again.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // If already logged in, skip to dashboard
  if (localStorage.getItem('storedge_token')) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
